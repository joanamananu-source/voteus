<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Create campaign | Voteus</title><link rel="stylesheet" href="auth.css"><style>.campaign-page{padding:42px 0}.campaign-page .panel{width:min(620px,100%);margin:auto}.campaign-page textarea{width:100%;min-height:120px;margin-top:6px;padding:12px 13px;border:1px solid var(--line);border-radius:4px;font:inherit;resize:vertical}.campaign-page textarea:focus{outline:0;border-color:var(--green);box-shadow:0 0 0 3px rgba(10,123,97,.12)}.mine{margin-top:28px}.mine h3{margin:0 0 8px}.mine-item{padding:14px 0;border-top:1px solid var(--line)}.mine-item strong,.mine-item span{display:block}.mine-item span{color:var(--muted);font-size:13px}</style></head><body><main class="page campaign-page"><section class="intro"><a class="brand" href="index.html"><span class="mark" aria-hidden="true"></span>Voteus</a><h1>Share your campaign.</h1><p>Create a public page that visitors can discover from the Voteus homepage.</p><a class="back" href="dashboard.html">Back to dashboard</a></section><section class="panel"><h2>Create a campaign</h2><p class="sub">Your campaign is published on the homepage as soon as you create it.</p><form id="campaignForm"><label for="campaignTitle">Campaign title<input id="campaignTitle" name="title" minlength="3" maxlength="120" required placeholder="e.g. Support our community project"></label><label for="campaignDescription">Campaign description<textarea id="campaignDescription" name="description" minlength="10" maxlength="1200" required placeholder="Tell visitors what your campaign is about and how they can help."></textarea></label><label for="campaignUrl">Action link <span style="font-weight:400">(optional)</span><input id="campaignUrl" name="destinationUrl" type="url" placeholder="https://example.com"></label><button class="button" type="submit">Publish campaign</button><p id="message" class="message" role="status"></p></form><section class="mine"><h3>Your campaigns</h3><div id="myCampaigns"><p class="sub">Loading…</p></div></section></section></main><script src="campaigns.js"></script></body></html>
