<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="description" content="Log in to Voteus."><title>Log in | Voteus</title><link rel="stylesheet" href="auth.css"></head>
<body><main class="page"><section class="intro"><a class="brand" href="index.html"><span class="mark" aria-hidden="true"></span>Voteus</a><h1>Good to see you again.</h1><p>Log in to manage your events, review results, and keep the conversation moving.</p><a class="back" href="index.html">Back to Voteus</a></section><section class="panel"><h2>Welcome back</h2><p class="sub">New to Voteus? <a href="register.html">Create an account</a></p><form id="loginForm" data-auth-form="login"><label for="email">Email address<input id="email" name="email" type="email" autocomplete="email" required></label><div class="password-row"><label for="password">Password</label><a href="recovery.html">Forgot password?</a></div><input id="password" name="password" type="password" autocomplete="current-password" required><label class="check"><input name="remember" type="checkbox">Keep me signed in</label><button class="button" type="submit">Log in</button><p class="message" id="message" role="status" aria-live="polite"></p></form></section></main><script src="auth.js"></script></body></html>
