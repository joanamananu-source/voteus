<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="description" content="Reset your Voteus password."><title>Reset password | Voteus</title><link rel="stylesheet" href="auth.css"></head>
<body><main class="page"><section class="intro"><a class="brand" href="index.html"><span class="mark" aria-hidden="true"></span>Voteus</a><h1>We will get you back in.</h1><p>Enter the email connected to your account and we will send a secure reset link.</p><a class="back" href="index.html">Back to Voteus</a></section><section class="panel"><h2>Reset your password</h2><p class="sub">Remembered it? <a href="login.html">Return to log in</a></p><form id="recoveryForm" data-auth-form="recovery"><label for="email">Email address<input id="email" name="email" type="email" autocomplete="email" required></label><label for="password" style="display:none">New password<input id="password" name="password" type="password" autocomplete="new-password" minlength="8" required></label><button class="button" type="submit">Send reset link</button><p class="message" id="message" role="status" aria-live="polite"></p></form></section></main><script src="auth.js"></script></body></html>
