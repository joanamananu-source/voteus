<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Nominees | Voteus</title>
  <style>:root{--ink:#102a43;--muted:#526b7b;--paper:#f6f8f7;--white:#fff;--green:#0a7b61;--line:#d9e2e6}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font:16px/1.5 Arial,Helvetica,sans-serif}.wrap{width:min(1120px,calc(100% - 40px));margin:auto}.nav{height:72px;display:flex;align-items:center;justify-content:space-between}.brand{color:var(--ink);font-size:24px;font-weight:800;text-decoration:none}.brand span{color:var(--green)}main{padding:35px 0 70px}h1{margin:0;font-size:38px}.sub{color:var(--muted)}select{width:min(430px,100%);margin:16px 0 25px;padding:12px;border:1px solid var(--line);border-radius:4px;background:#fff;font:inherit}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.card{overflow:hidden;border:1px solid var(--line);border-radius:7px;background:var(--white)}.photo,.placeholder{display:grid;width:100%;height:260px;place-items:center;background:#dceae5;color:#526b7b;object-fit:cover}.body{padding:18px}.body h2{margin:0;font-size:20px}.body p{margin:7px 0;color:var(--muted)}.code{display:inline-block;padding:4px 7px;border-radius:3px;background:#eaf3ef;color:var(--green);font:13px monospace;font-weight:700}.button{display:block;margin-top:16px;padding:10px;text-align:center;border-radius:4px;background:var(--green);color:#fff;font-weight:700;text-decoration:none}.empty{padding:30px;background:#fff;border:1px dashed var(--line);border-radius:7px;color:var(--muted)}@media(max-width:720px){.grid{grid-template-columns:1fr}.photo,.placeholder{height:300px}}</style>
</head>
<body><nav class="wrap nav"><a class="brand" href="index.html">Vote<span>us</span></a><a href="vote.html">Cast a vote</a></nav><main class="wrap"><h1>Meet the nominees</h1><p class="sub">Browse contestant flyers, find their unique code, and vote for the person you support.</p><label for="event">Select an event</label><br><select id="event"><option value="">Choose an event</option></select><div id="nominees" class="grid" aria-live="polite"></div></main>
  <script>(()=>{const select=document.querySelector('#event'),grid=document.querySelector('#nominees');const api=async url=>{const response=await fetch(url);const data=await response.json().catch(()=>({}));if(!response.ok)throw new Error(data.error||'Unable to load nominees.');return data};const render=event=>{grid.replaceChildren();if(!event.nominees.length){grid.innerHTML='<p class="empty">No nominees have been added to this event yet.</p>';return}event.nominees.forEach(nominee=>{const category=event.categories.find(item=>item.id===nominee.categoryId);const card=document.createElement('article');card.className='card';if(nominee.photoUrl){const image=document.createElement('img');image.className='photo';image.src=nominee.photoUrl;image.alt=`Flyer for ${nominee.name}`;card.append(image)}else{const placeholder=document.createElement('div');placeholder.className='placeholder';placeholder.textContent='No flyer uploaded';card.append(placeholder)}const body=document.createElement('div');body.className='body';body.innerHTML=`<h2></h2><p></p><span class="code"></span>`;body.querySelector('h2').textContent=nominee.name;body.querySelector('p').textContent=category?category.name:'Nominee';body.querySelector('.code').textContent=nominee.code;const vote=document.createElement('a');vote.className='button';vote.href=`vote.html?event=${encodeURIComponent(event.id)}&nominee=${encodeURIComponent(nominee.code)}`;vote.textContent='Vote for this nominee';body.append(vote);card.append(body);grid.append(card)})};const load=async()=>{grid.innerHTML='';if(!select.value)return;try{const {event}=await api(`/api/events/${select.value}/vote`);render(event)}catch(error){grid.innerHTML=`<p class="empty">${error.message}</p>`}};select.addEventListener('change',load);api('/api/events').then(({events})=>{events.forEach(event=>{const option=document.createElement('option');option.value=event.id;option.textContent=event.name;select.append(option)});const id=new URLSearchParams(location.search).get('event');if(id&&events.some(event=>event.id===id)){select.value=id;load()}}).catch(error=>{grid.innerHTML=`<p class="empty">${error.message}</p>`})})()</script>
</body></html>
