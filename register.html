<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="description" content="Create a Voteus account."><title>Create account | Voteus</title><link rel="stylesheet" href="auth.css"></head>
<body><main class="page"><section class="intro"><a class="brand" href="index.html"><span class="mark" aria-hidden="true"></span>Voteus</a><h1>Start with one good decision.</h1><p>Set up your account and launch a clear, trustworthy voting event in minutes.</p><a class="back" href="index.html">Back to Voteus</a></section><section class="panel"><h2>Create your account</h2><p class="sub">Already registered? <a href="login.html">Log in</a></p><form id="registerForm" data-auth-form="register"><label for="name">Your name<input id="name" name="name" autocomplete="name" minlength="2" required></label><label for="email">Email address<input id="email" name="email" type="email" autocomplete="email" required></label><label for="password">Create a password<input id="password" name="password" type="password" autocomplete="new-password" minlength="8" required></label><ul class="requirements"><li>At least 8 characters</li><li>A mix of letters and numbers is best</li></ul><label class="check"><input name="terms" type="checkbox" required>I agree to the <a href="terms.html" target="_blank" rel="noopener">Terms &amp; Conditions</a> and <a href="terms.html#privacy" target="_blank" rel="noopener">Privacy Notice</a>.</label><button class="button" type="submit">Create account</button><p class="message" id="message" role="status" aria-live="polite"></p></form></section></main><script src="auth.js"></script></body></html>
