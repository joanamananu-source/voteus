<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Nominee rankings | Voteus</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>:root{--green:#167254;--ink:#10231d;--muted:#5f726b;--line:#d8ebe1;--bg:#f5fcf7}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:16px/1.5 Inter,Arial,sans-serif}.wrap{width:min(940px,calc(100% - 32px));margin:auto}.nav{height:72px;display:flex;align-items:center;justify-content:space-between}.brand,.back{text-decoration:none;font-weight:800}.brand{font-size:23px;color:var(--ink)}.brand span,.back{color:var(--green)}.back{font-size:14px}main{padding:34px 0 70px}.eyebrow{margin:0 0 8px;color:var(--green);font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}h1{margin:0;font-size:clamp(30px,5vw,44px);letter-spacing:-1.4px}.intro{margin-bottom:28px;color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.nominee{display:grid;grid-template-columns:58px 1fr auto;gap:14px;align-items:center;padding:16px;border:1px solid var(--line);border-radius:16px;background:#fff;box-shadow:0 5px 14px rgba(22,114,84,.05)}.photo,.placeholder{width:58px;height:58px;border-radius:14px;object-fit:cover}.placeholder{display:grid;place-items:center;background:#e2f5e9;color:var(--green);font-weight:800}.rank{display:inline-flex;margin-bottom:4px;color:var(--green);font-size:12px;font-weight:800}.name{font-weight:800}.category{color:var(--muted);font-size:13px}.votes{text-align:right;color:var(--green);font-size:20px;font-weight:800}.votes span{display:block;color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase}.empty{padding:30px;border:1px dashed #b7dfc6;border-radius:14px;color:var(--muted);text-align:center}@media(max-width:640px){.grid{grid-template-columns:1fr}.nominee{grid-template-columns:52px 1fr auto}.photo,.placeholder{width:52px;height:52px}}</style></head><body><nav class="wrap nav"><a class="brand" href="dashboard.html">Vote<span>us</span></a><a class="back" href="dashboard.html">Back to dashboard</a></nav><main class="wrap"><p class="eyebrow">Live results</p><h1 id="title">Nominee rankings</h1><p id="intro" class="intro">Loading rankings...</p><section id="rankings" class="grid" aria-live="polite"></section></main><script src="rankings.js"></script></body></html>
