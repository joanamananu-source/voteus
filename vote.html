<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Cast a vote | Voteus</title><style>:root{--ink:#102a43;--muted:#526b7b;--paper:#f6f8f7;--white:#fff;--green:#0a7b61;--line:#d9e2e6;--error:#b53e32}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font:16px/1.5 Arial,Helvetica,sans-serif}.wrap{width:min(680px,calc(100% - 32px));margin:auto}.nav{height:72px;display:flex;align-items:center;justify-content:space-between}.brand{color:var(--ink);font-size:24px;font-weight:800;text-decoration:none}.brand span{color:var(--green)}main{padding:38px 0 70px}.card{padding:28px;background:var(--white);border:1px solid var(--line);border-radius:8px}h1{margin:0;font-size:34px}.sub,.help{color:var(--muted)}label{display:block;margin-top:18px;font-size:13px;font-weight:700}input,select{width:100%;margin-top:6px;padding:12px;border:1px solid var(--line);border-radius:4px;font:inherit}.payment{margin-top:22px;padding:18px;background:#eef7f3;border-radius:5px}.payment[hidden]{display:none}.button{width:100%;margin-top:24px;padding:13px;border:0;border-radius:4px;background:var(--green);color:#fff;font-weight:700;font:inherit;cursor:pointer}.button:disabled{opacity:.6;cursor:wait}.notice{display:none;margin:18px 0 0;font-weight:700}.error{color:var(--error)}.success{color:var(--green)}.nominees{margin:12px 0 0;padding:0;list-style:none}.nominees li{padding:9px 0;border-top:1px solid var(--line);cursor:pointer}.code{display:inline-block;margin-left:7px;padding:2px 6px;border-radius:3px;background:#eaf3ef;color:var(--green);font:12px monospace;font-weight:bold}@media(max-width:500px){.card{padding:20px}h1{font-size:29px}}</style></head>
<body><nav class="wrap nav"><a class="brand" href="index.html">Vote<span>us</span></a><a href="index.html">All events</a></nav><main class="wrap"><section class="card"><h1>Cast your vote</h1><p class="sub">Choose an event, then use the contestant's unique nominee code.</p><form id="voteForm"><label>Event<select id="event" required><option value="">Choose an event</option></select></label><div id="eventInfo" hidden><p id="eventStatus" class="help"></p><ul id="nominees" class="nominees"></ul></div><label>Nominee code<input id="nomineeCode" required placeholder="e.g. N-A1B2C3" autocomplete="off"></label><label>Number of votes<input id="quantity" type="number" min="1" max="1000" value="1" required></label><label>Your name<input id="voterName" required minlength="2" autocomplete="name"></label><div id="payment" class="payment" hidden><strong id="paymentTitle">Payment required</strong><p class="help">Pay from your mobile-money wallet. This local prototype simulates confirmation; it does not collect real money.</p><label>Mobile-money network<select id="mobileNetwork"><option>MTN MoMo</option><option>Telecel Cash</option><option>AirtelTigo Money</option><option>M-Pesa</option></select></label><label>Mobile-money number<input id="mobileNumber" inputmode="tel" autocomplete="tel" placeholder="e.g. 024 123 4567"></label></div><button id="submit" class="button" type="submit">Cast vote</button><p id="notice" class="notice" role="status" aria-live="polite"></p></form></section></main><script>(()=>{const $=s=>document.querySelector(s),eventSelect=$('#event'),form=$('#voteForm'),info=$('#eventInfo'),nominees=$('#nominees'),paymentBox=$('#payment'),paymentTitle=$('#paymentTitle'),quantity=$('#quantity'),mobileNetwork=$('#mobileNetwork'),mobileNumber=$('#mobileNumber'),notice=$('#notice'),submit=$('#submit');let eventData=null;const show=(m,e=false)=>{notice.textContent=m;notice.className=`notice ${e?'error':'success'}`;notice.style.display='block'};async function api(url,o){const r=await fetch(url,o),d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||'Unable to complete this request.');return d}function updatePaymentSummary(){if(!eventData?.payment?.enabled)return;const n=Math.max(1,Math.min(1000,Number(quantity.value)||1)),total=Number(eventData.payment.amount)*n;paymentTitle.textContent=`Pay ${total.toFixed(2)} ${eventData.payment.currency} for ${n} vote${n===1?'':'s'} · 15% platform fee applies`}async function loadEvent(){eventData=null;info.hidden=true;paymentBox.hidden=true;if(!eventSelect.value)return;try{const {event}=await api(`/api/events/${eventSelect.value}/vote`);eventData=event;info.hidden=false;$('#eventStatus').textContent=event.votingOpen?'Voting is open. Choose from 1 to 1,000 votes for a nominee.':'Voting is currently closed for this event.';nominees.replaceChildren();event.nominees.forEach(n=>{const c=event.categories.find(x=>x.id===n.categoryId),li=document.createElement('li');li.textContent=`${n.name}${c?` — ${c.name}`:''}`;const code=document.createElement('span');code.className='code';code.textContent=n.code;li.append(code);li.onclick=()=>$('#nomineeCode').value=n.code;nominees.append(li)});const paid=event.payment?.enabled;paymentBox.hidden=!paid;mobileNetwork.required=paid;mobileNumber.required=paid;updatePaymentSummary();submit.textContent=paid?'Pay by mobile money and vote':'Cast vote'}catch(e){show(e.message,true)}}async function loadEvents(){try{const {events}=await api('/api/events');events.forEach(e=>{const o=document.createElement('option');o.value=e.id;o.textContent=e.name;eventSelect.append(o)});const requested=new URLSearchParams(location.search).get('event');if(requested&&events.some(e=>e.id===requested)){eventSelect.value=requested;loadEvent()}}catch(e){show(e.message,true)}}eventSelect.onchange=loadEvent;quantity.oninput=updatePaymentSummary;form.onsubmit=async e=>{e.preventDefault();if(!form.reportValidity()||!eventData)return;if(!eventData.votingOpen)return show('Voting is currently closed for this event.',true);submit.disabled=true;const label=submit.textContent;try{const paid=eventData.payment?.enabled,payment=paid?{status:'completed',method:mobileNetwork.value,mobileNumber:mobileNumber.value}:{};const result=await api(`/api/events/${eventData.id}/votes`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nomineeCode:$('#nomineeCode').value,quantity:quantity.value,voterName:$('#voterName').value,payment})});show(`${result.message}${result.payment?` Mobile-money receipt: ${result.payment.reference}.`:''}`);form.reset();quantity.value=1;eventSelect.value=eventData.id;loadEvent()}catch(e){show(e.message,true)}finally{submit.disabled=false;submit.textContent=label}};loadEvents()})()</script></body></html>
