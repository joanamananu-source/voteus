<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Buy event tickets | Voteus</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>:root{--green:#1E7A5A;--ink:#0F172A;--muted:#64748B;--bg:#F8FAFC;--line:#E2E8F0;--danger:#DC2626}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:16px/1.5 Inter,Arial,sans-serif}.wrap{width:min(700px,calc(100% - 32px));margin:auto}.nav{height:70px;display:flex;align-items:center;justify-content:space-between}.brand,.back{text-decoration:none}.brand{color:var(--ink);font-size:22px;font-weight:800}.brand span,.back{color:var(--green)}.back{font-size:14px;font-weight:700}main{padding:30px 0 70px}.card{padding:28px;background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 3px 10px rgba(15,23,42,.03)}h1{margin:0;font-size:32px;letter-spacing:-.8px}.sub,.help{color:var(--muted)}label{display:block;margin-top:17px;color:#334155;font-size:13px;font-weight:700}input,select{width:100%;margin-top:6px;padding:12px;border:1px solid var(--line);border-radius:8px;background:#fff;font:inherit}input:focus,select:focus{outline:0;border-color:var(--green);box-shadow:0 0 0 3px rgba(30,122,90,.12)}.ticket-list{display:grid;gap:10px;margin-top:18px}.ticket{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px;border:1px solid var(--line);border-radius:10px}.ticket.selected{border-color:var(--green);background:#f0faf6}.ticket strong,.ticket span{display:block}.ticket span{color:var(--muted);font-size:13px}.ticket button{padding:8px 11px;border:1px solid var(--green);border-radius:7px;background:#fff;color:var(--green);font-weight:700;cursor:pointer}.payment{margin-top:20px;padding:16px;border-radius:10px;background:#f0faf6}.button{width:100%;margin-top:22px;padding:13px;border:0;border-radius:9px;background:var(--green);color:#fff;font-weight:700;cursor:pointer}.button:disabled{opacity:.6}.notice{display:none;margin-top:17px;padding:12px;border-radius:8px;font-weight:600}.notice.success{display:block;background:#dcfce7;color:#166534}.notice.error{display:block;background:#fef2f2;color:var(--danger)}.receipt{margin-top:18px;padding:15px;border:1px solid #bbdfcf;border-radius:10px;background:#f7fdf9}.receipt[hidden]{display:none}@media(max-width:500px){.card{padding:20px}h1{font-size:28px}}</style></head><body><nav class="wrap nav"><a class="brand" href="index.html">Vote<span>us</span></a><a class="back" href="index.html">Home</a></nav><main class="wrap"><section class="card"><h1>Buy event tickets</h1><p class="sub">Choose an event and ticket type. Your ticket code is issued immediately after payment.</p><form id="ticketForm"><label for="event">Event<select id="event" required><option value="">Choose an event</option></select></label><div id="tickets" class="ticket-list" aria-live="polite"></div><label for="buyerName">Ticket holder name<input id="buyerName" required minlength="2" autocomplete="name"></label><label for="quantity">Number of tickets<input id="quantity" type="number" min="1" max="10" value="1" required></label><div id="payment" class="payment" hidden><strong id="paymentTitle">Mobile-money payment</strong><p class="help">Enter your mobile-money number to complete the ticket purchase.</p><label for="mobileNumber">Mobile-money number<input id="mobileNumber" inputmode="tel" autocomplete="tel" placeholder="e.g. 024 123 4567"></label></div><button id="purchase" class="button" type="submit" disabled>Choose a ticket</button><p id="notice" class="notice" role="status"></p></form><div id="receipt" class="receipt" hidden><strong>Tickets issued</strong><p id="ticketCodes"></p></div></section></main><script src="tickets.js"></script></body></html>
